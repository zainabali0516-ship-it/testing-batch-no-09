<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Assignment - JS Calculations</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f4f4;
        text-align: center;
    }
    .container {
        width: 350px;
        margin: 20px auto;
        padding: 20px;
        background: white;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    input, button {
        width: 90%;
        padding: 8px;
        margin: 5px;
    }
    button {
        background: #007bff;
        color: white;
        border: none;
        cursor: pointer;
    }
    button:hover {
        background: #0056b3;
    }
</style>
</head>

<body>

<div class="container">
    <h3>Total Price</h3>
    <input type="number" id="price1" placeholder="Item 1">
    <input type="number" id="price2" placeholder="Item 2">
    <button onclick="totalPrice()">Calculate</button>
    <p id="total"></p>
</div>

<div class="container">
    <h3>Discount (10%)</h3>
    <input type="number" id="amount" placeholder="Enter Amount">
    <button onclick="discount()">Apply</button>
    <p id="discountResult"></p>
</div>

<div class="container">
    <h3>BMI Calculator</h3>
    <input type="number" id="weight" placeholder="Weight (kg)">
    <input type="number" id="height" placeholder="Height (m)">
    <button onclick="bmi()">Calculate</button>
    <p id="bmiResult"></p>
</div>

<div class="container">
    <h3>Login System</h3>
    <input type="text" id="user" placeholder="Username">
    <input type="password" id="pass" placeholder="Password">
    <button onclick="login()">Login</button>
    <p id="loginResult"></p>
</div>

<div class="container">
    <h3>Age Check</h3>
    <input type="number" id="age" placeholder="Enter Age">
    <button onclick="checkAge()">Check</button>
    <p id="ageResult"></p>
</div>

<div class="container">
    <h3>Grade Calculator</h3>
    <input type="number" id="marks" placeholder="Enter Marks">
    <button onclick="grade()">Check</button>
    <p id="gradeResult"></p>
</div>

<script>
function totalPrice() {
    let p1 = +document.getElementById("price1").value;
    let p2 = +document.getElementById("price2").value;
    document.getElementById("total").innerText = "Total: $" + (p1 + p2);
}

function discount() {
    let amt = +document.getElementById("amount").value;
    let final = amt - (amt * 0.10);
    document.getElementById("discountResult").innerText = "After Discount: $" + final;
}

function bmi() {
    let w = +document.getElementById("weight").value;
    let h = +document.getElementById("height").value;
    let bmi = w / (h * h);
    document.getElementById("bmiResult").innerText = "BMI: " + bmi.toFixed(2);
}

function login() {
    let u = document.getElementById("user").value;
    let p = document.getElementById("pass").value;

    if (u === "admin" && p === "1234") {
        document.getElementById("loginResult").innerText = "Login Successful";
    } else {
        document.getElementById("loginResult").innerText = "Invalid Login";
    }
}

function checkAge() {
    let age = document.getElementById("age").value;
    if (age >= 18) {
        document.getElementById("ageResult").innerText = "Access Allowed";
    } else {
        document.getElementById("ageResult").innerText = "Access Denied";
    }
}

function grade() {
    let m = document.getElementById("marks").value;

    if (m >= 80) {
        result = "A";
    } else if (m >= 60) {
        result = "B";
    } else if (m >= 40) {
        result = "C";
    } else {
        result = "Fail";
    }

    document.getElementById("gradeResult").innerText = "Grade: " + result;
}
</script>

</body>
</html>
